<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visiting Card Scanner</title>
    <link rel="icon" href="{{ url_for('static', filename='images/IshaanLogo.png') }}" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <div class="startButton">
        <h1>Login</h1>

        <form id="leadForm" onsubmit="login(); return false;">
            
            <div class="form-group">
                <small>Company ID</small>
                <input type="text" id="id" required placeholder="Enter Company ID">
            </div>

            <div class="form-group">
                <small>Password</small>

                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="Enter Password">

                    <i class="fa-solid fa-eye eye-icon" id="eyeIcon" onclick="togglePassword()"></i>
                </div>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

    <footer class="footer">
        Developed by 
        <a href="https://ishaanguptaportfolio.netlify.app/" target="_blank">
            <strong>Ishaan Gupta</strong>
        </a>
    </footer>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
