<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visiting Card Scanner</title>
    <link rel="icon" href="{{ url_for('static', filename='images/IshaanLogo.png') }}" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a>
                {% if current_user.company_name %}
                    <i class="fa-solid fa-briefcase" id="userIcon"></i>
                    &nbsp;
                    {{ current_user.company_name[:18] }}
                {% endif %}
            <a>
        </div>

        <div class="nav-right">
            <a href="/logout">Logout &nbsp; <i class="fa-solid fa-arrow-right-from-bracket" id="userIcon"></i></a>
        </div>
    </nav>
    <div class="startButton">
        <h1>Business Card Scanner</h1>
        <a href="/scan">
            <button>Start Scan</button>
        </a>
        <a>
            <button style="margin-top: 20px" onclick="manualLead()">Add Manually</button>
        </a>
        <a href="/leads">
            <button style="margin-top: 20px">View Leads</button>
        </a>
    </div>

    <footer class="footer">
        Developed by <a href = "https://ishaanguptaportfolio.netlify.app/" target = "_blank"><strong>Ishaan Gupta</strong></a>
    </footer>

    <script>
        function manualLead(){
            sessionStorage.removeItem("leadData");
            window.location.href = "/form";
        }
    </script>
</body>
</html>
